<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="440" viewBox="0 0 1280 440" role="img" aria-label="Driftmail — a moonlit night beach; a corked bottle with a letter inside sits on the sand under a path of moonlight">
<defs>
<linearGradient id="dsky" x1="0" y1="0" x2="0" y2="1"><stop offset="0" stop-color="#03040b"/><stop offset=".5" stop-color="#071026"/><stop offset="1" stop-color="#0a1830"/></linearGradient>
<linearGradient id="dsea" x1="0" y1="0" x2="0" y2="1"><stop offset="0" stop-color="#0a182e"/><stop offset="1" stop-color="#061020"/></linearGradient>
<linearGradient id="dpath" x1="0" y1="0" x2="0" y2="1"><stop offset="0" stop-color="#f3ecd8" stop-opacity=".30"/><stop offset="1" stop-color="#f3ecd8" stop-opacity=".06"/></linearGradient>
</defs>
<rect width="1280" height="248" fill="url(#dsky)"/>
<g fill="#e9edf6"><circle cx="110" cy="60" r="1.3" opacity=".6"/><circle cx="320" cy="36" r="1" opacity=".5"/><circle cx="540" cy="84" r="1.1" opacity=".55"/><circle cx="208" cy="130" r=".9" opacity=".4"/><circle cx="700" cy="50" r="1" opacity=".5"/><circle cx="1180" cy="90" r="1.2" opacity=".6"/><circle cx="1080" cy="40" r=".9" opacity=".45"/><circle cx="430" cy="160" r=".8" opacity=".35"/></g>
<!-- moon, waxing gibbous -->
<circle cx="920" cy="92" r="74" fill="#f3ecd8" opacity=".07"/>
<circle cx="920" cy="92" r="40" fill="#1a2236"/>
<path d="M 920 52 a 40 40 0 0 1 0 80 a 24 40 0 0 0 0 -80 Z" fill="#f3ecd8"/>
<circle cx="920" cy="92" r="40" fill="none" stroke="#f3ecd8" stroke-opacity=".3"/>
<!-- sea -->
<rect y="248" width="1280" height="110" fill="url(#dsea)"/>
<polygon points="902,252 938,252 1006,358 834,358" fill="url(#dpath)"/>
<!-- wave lines -->
<path d="M0 332 q 40 -8 80 0 t 80 0 t 80 0 t 80 0 t 80 0 t 80 0 t 80 0 t 80 0 t 80 0 t 80 0 t 80 0 t 80 0 t 80 0 t 80 0 t 80 0 t 80 0" fill="none" stroke="#cde6f0" stroke-opacity=".22" stroke-width="2"/>
<path d="M0 310 q 50 -7 100 0 t 100 0 t 100 0 t 100 0 t 100 0 t 100 0 t 100 0 t 100 0 t 100 0 t 100 0 t 100 0 t 100 0 t 100 0" fill="none" stroke="#9fc4d8" stroke-opacity=".12" stroke-width="1.6"/>
<!-- sand -->
<path d="M0 358 Q 320 348 640 356 T 1280 352 L 1280 440 L 0 440 Z" fill="#16141a"/>
<!-- the bottle, beached, glowing faintly -->
<g transform="translate(380,386) rotate(-72)">
<circle cx="0" cy="0" r="44" fill="#9fe1cb" opacity=".10"/>
<path d="M -9 18 L -9 -6 Q -9 -12 -4 -14 L -4 -22 L 4 -22 L 4 -14 Q 9 -12 9 -6 L 9 18 Q 9 22 0 22 Q -9 22 -9 18 Z" fill="rgba(140,190,170,.32)" stroke="rgba(190,230,215,.6)" stroke-width="1.4"/>
<rect x="-4.5" y="-27" width="9" height="6" fill="rgba(214,170,120,.95)"/>
<rect x="-5" y="-4" width="10" height="14" fill="rgba(240,234,214,.85)" transform="rotate(10)"/>
<path d="M -5.5 -10 Q -7 2 -5.5 14" fill="none" stroke="rgba(255,255,255,.5)"/>
</g>
<text x="430" y="404" font-family="Space Mono, monospace" font-size="15" fill="#6f79a0" letter-spacing="2">a letter, in a link, in the tide</text>
</svg>
