<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="440" viewBox="0 0 1280 440" role="img" aria-label="Fuse — a drawn fuse line loops across a night sky toward a blooming firework; a piñata and tacos wait below">
<defs>
<linearGradient id="fsky" x1="0" y1="0" x2="0" y2="1"><stop offset="0" stop-color="#05060f"/><stop offset=".55" stop-color="#0a1430"/><stop offset="1" stop-color="#0c1838"/></linearGradient>
<radialGradient id="fglow" cx="50%" cy="50%" r="50%"><stop offset="0" stop-color="#ffce7a" stop-opacity=".55"/><stop offset=".5" stop-color="#ff8a4c" stop-opacity=".18"/><stop offset="1" stop-color="#ff6a3d" stop-opacity="0"/></radialGradient>
</defs>
<rect width="1280" height="440" fill="url(#fsky)"/>
<g fill="#e9edf6"><circle cx="120" cy="70" r="1.4" opacity=".7"/><circle cx="300" cy="40" r="1" opacity=".5"/><circle cx="520" cy="90" r="1.2" opacity=".6"/><circle cx="760" cy="50" r="1" opacity=".5"/><circle cx="1130" cy="120" r="1.3" opacity=".7"/><circle cx="980" cy="60" r="1" opacity=".45"/><circle cx="220" cy="180" r="1" opacity=".4"/><circle cx="1210" cy="260" r="1.1" opacity=".5"/><circle cx="60" cy="300" r="1" opacity=".4"/><circle cx="660" cy="150" r=".9" opacity=".4"/></g>
<!-- the drawn fuse: starts low left, loops, climbs toward the bloom -->
<path d="M 90 380 C 220 360 260 290 220 250 C 180 210 240 170 330 200 C 430 234 560 250 660 210 C 760 170 800 150 880 120" fill="none" stroke="#6b78ff" stroke-width="2.4" stroke-linecap="round" stroke-dasharray="2 9" opacity=".85"/>
<!-- wobble at the end of the path -->
<path d="M 880 120 q 14 -10 22 2 q 8 12 20 0 q 10 -10 18 -4" fill="none" stroke="#9aa6ff" stroke-width="2.2" stroke-linecap="round" stroke-dasharray="2 7" opacity=".9"/>
<!-- rocket head -->
<circle cx="942" cy="116" r="5" fill="#fff7e8"/>
<circle cx="942" cy="116" r="11" fill="#ffce7a" opacity=".35"/>
<!-- the bloom -->
<circle cx="1030" cy="92" r="86" fill="url(#fglow)"/>
<g stroke="#ffce7a" stroke-width="2" stroke-linecap="round" opacity=".95">
<line x1="1030" y1="92" x2="1030" y2="22"/><line x1="1030" y1="92" x2="1086" y2="42"/><line x1="1030" y1="92" x2="1104" y2="92"/><line x1="1030" y1="92" x2="1086" y2="142"/><line x1="1030" y1="92" x2="1030" y2="164"/><line x1="1030" y1="92" x2="974" y2="142"/><line x1="1030" y1="92" x2="956" y2="92"/><line x1="1030" y1="92" x2="974" y2="42"/>
</g>
<g stroke="#ff8a4c" stroke-width="1.6" stroke-linecap="round" opacity=".8">
<line x1="1030" y1="92" x2="1062" y2="28"/><line x1="1030" y1="92" x2="1096" y2="64"/><line x1="1030" y1="92" x2="1096" y2="120"/><line x1="1030" y1="92" x2="1062" y2="156"/><line x1="1030" y1="92" x2="998" y2="156"/><line x1="1030" y1="92" x2="964" y2="120"/><line x1="1030" y1="92" x2="964" y2="64"/><line x1="1030" y1="92" x2="998" y2="28"/>
</g>
<g fill="#ffe9c4"><circle cx="1030" cy="14" r="2.2"/><circle cx="1094" cy="36" r="2"/><circle cx="1112" cy="92" r="2.2"/><circle cx="1094" cy="148" r="2"/><circle cx="1030" cy="172" r="2.2"/><circle cx="966" cy="148" r="2"/><circle cx="948" cy="92" r="2.2"/><circle cx="966" cy="36" r="2"/></g>
<!-- ground + the piñata option -->
<path d="M0 408 Q 160 396 320 406 T 640 404 T 960 408 T 1280 402 L 1280 440 L 0 440 Z" fill="#03050c" opacity=".92"/>
<text x="120" y="416" font-size="30" text-anchor="middle">🪅</text>
<text x="168" y="424" font-size="20" text-anchor="middle">🌮</text>
<text x="196" y="418" font-size="16" text-anchor="middle">🌮</text>
<text x="74" y="424" font-size="17" text-anchor="middle">🌮</text>
<!-- mono caption -->
<text x="92" y="358" font-family="Space Mono, monospace" font-size="15" fill="#6f79a0" letter-spacing="2">draw the fuse →</text>
</svg>
