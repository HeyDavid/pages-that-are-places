<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" role="img" aria-label="A porthole showing stars above a dark sea">
  <defs>
    <clipPath id="port"><circle cx="50" cy="50" r="45"/></clipPath>
    <linearGradient id="sky" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#0a1430"/>
      <stop offset="1" stop-color="#10204a"/>
    </linearGradient>
    <linearGradient id="sea" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#06182c"/>
      <stop offset="1" stop-color="#02080f"/>
    </linearGradient>
    <radialGradient id="orb" cx="42%" cy="40%" r="60%">
      <stop offset="0" stop-color="#fef6e6"/>
      <stop offset="0.65" stop-color="#ecdcb8"/>
      <stop offset="1" stop-color="#c8a672"/>
    </radialGradient>
  </defs>
  <g clip-path="url(#port)">
    <rect x="4" y="4" width="92" height="50" fill="url(#sky)"/>
    <rect x="4" y="54" width="92" height="42" fill="url(#sea)"/>
    <g fill="#eaf0ff">
      <circle cx="24" cy="22" r="1.1"/>
      <circle cx="38" cy="15" r="0.8"/>
      <circle cx="33" cy="35" r="0.9"/>
      <circle cx="60" cy="41" r="0.8"/>
      <circle cx="80" cy="27" r="1"/>
      <circle cx="19" cy="41" r="0.7"/>
      <circle cx="50" cy="13" r="0.7" fill="#b8c8ff"/>
      <circle cx="71" cy="46" r="0.6"/>
    </g>
    <circle cx="68" cy="27" r="7.5" fill="url(#orb)"/>
    <circle cx="68" cy="27" r="7.5" fill="none" stroke="#fff3d6" stroke-opacity="0.25" stroke-width="0.5"/>
    <rect x="4" y="50.5" width="92" height="6" fill="#5b8def" opacity="0.16"/>
    <rect x="4" y="53.4" width="92" height="1.2" fill="#9cc4ff" opacity="0.92"/>
    <rect x="65" y="55" width="6" height="24" fill="#cfe0ff" opacity="0.12"/>
    <circle cx="30" cy="71" r="1" fill="#9fe1cb" opacity="0.6"/>
    <circle cx="78" cy="80" r="0.9" fill="#9fe1cb" opacity="0.5"/>
    <circle cx="47" cy="84" r="0.8" fill="#bfe9da" opacity="0.5"/>
  </g>
  <circle cx="50" cy="50" r="45" fill="none" stroke="#070a12" stroke-width="3"/>
  <circle cx="50" cy="50" r="46.6" fill="none" stroke="#6b78ff" stroke-opacity="0.55" stroke-width="1.4"/>
  <circle cx="50" cy="50" r="43.4" fill="none" stroke="#cdd6f5" stroke-opacity="0.18" stroke-width="0.8"/>
</svg>
